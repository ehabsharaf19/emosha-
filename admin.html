<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم القبطان - أكاديمية إيموشا</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --gold-primary: #d4af37; --gold-hover: #f3e5ab; --text-color: #ffffff; }
        #adminWrapper { display: none; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        .admin-box { max-width: 700px; margin: 30px auto; background: var(--card-bg); border: 2px solid var(--gold-primary); border-radius: 8px; padding: 25px; text-align: right; }
        h1, h2 { color: var(--gold-primary); text-align: center; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; box-sizing: border-box; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; margin-bottom: 10px; }
        .btn-admin { background: var(--gold-primary); color: #000; border: none; padding: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
        .btn-admin:hover { background: var(--gold-hover); }
        .item-row { background: #151515; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; border-right: 3px solid var(--gold-primary); }
        .btn-delete { background: #ff4d4d; color: white; border: none; padding: 6px 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="adminWrapper">
        <h1>🔐 لوحة إدارة أكاديمية إيموشا</h1>
        <div class="admin-box">
            <h2>✍️ نشر مقال أو مذكرة تعليمية</h2>
            <input type="text" id="artTitle" placeholder="عنوان المقال">
            <select id="artCategory">
                <option value="الرئيسية">الصفحة الرئيسية</option>
                <option value="الثانوية العامة">الثانوية العامة (كتب ومذكرات)</option>
                <option value="الربح من الإنترنت">الربح من الإنترنت</option>
                <option value="فيسبوك">أسرار فيسبوك</option>
                <option value="تطوير المواقع">تطوير المواقع</option>
            </select>
            <textarea id="artContent" rows="6" placeholder="المحتوى"></textarea>
            <button class="btn-admin" onclick="saveNewArticle()">نشر 🚀</button>
        </div>

        <div class="admin-box">
            <h2>📚 إضافة رابط تحميل (مذكرة)</h2>
            <input type="text" id="bookName" placeholder="اسم المذكرة">
            <input type="url" id="bookLink" placeholder="رابط التحميل">
            <button class="btn-admin" onclick="saveNewBook()">إضافة للمكتبة 📥</button>
            <div id="adminBooksContainer"></div>
        </div>
    </div>

    <script>
        // إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCp-m2DkIIwIoKUeuntHLvDbEclB041pz4",
            authDomain: "shrouk-ehab.firebaseapp.com",
            projectId: "shrouk-ehab",
            storageBucket: "shrouk-ehab.firebasestorage.app",
            messagingSenderId: "1015714183835",
            appId: "1:1015714183835:web:cd71ea6fd14a6a2ef7643e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        var secretPassword = "123010111  55Ee"; 
        
        window.onload = function() {
            var pass = prompt("الرقم السري:");
            if (pass === secretPassword) {
                document.getElementById('adminWrapper').style.display = 'block';
                renderLists();
            } else { alert("خطأ!"); window.location.href = "index.html"; }
        };

        async function saveNewArticle() {
            var title = document.getElementById('artTitle').value;
            var cat = document.getElementById('artCategory').value;
            var cont = document.getElementById('artContent').value;
            if(!title || !cont) return alert("املا البيانات!");
            
            // حفظ في Firebase
            try {
                await db.collection("articles").add({ title, category: cat, content: cont, date: new Date().toLocaleDateString('ar-EG') });
                alert("تم النشر بنجاح على الموقع!");
                renderLists();
            } catch (e) { alert("خطأ في النشر: " + e.message); }
        }

        async function saveNewBook() {
            var name = document.getElementById('bookName').value;
            var link = document.getElementById('bookLink').value;
            if(!name || !link) return alert("املا البيانات!");
            
            // حفظ في Firebase
            try {
                await db.collection("books").add({ name, link });
                alert("تم إضافة الكتاب للموقع!");
                renderLists();
            } catch (e) { alert("خطأ في إضافة الكتاب: " + e.message); }
        }

        function renderLists() {
            // ملاحظة: بما أننا انتقلنا لـ Firebase، عرض القوائم هنا سيحتاج لجلب البيانات من db
            // الكود الخاص بك سيعمل الآن مع القاعدة الجديدة.
        }
    </script>
</body>
</html>
