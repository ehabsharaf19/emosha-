<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم القبطان - أكاديمية إيموشا</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --gold-primary: #d4af37; --text-color: #ffffff; }
        #adminWrapper { display: none; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; padding: 20px; text-align: center; }
        .admin-box { max-width: 700px; margin: 30px auto; background: var(--card-bg); border: 2px solid var(--gold-primary); padding: 25px; text-align: right; }
        input, select, textarea { width: 100%; padding: 12px; background: #222; color: #fff; border: 1px solid #444; margin-bottom: 10px; }
        .btn-admin { background: var(--gold-primary); color: #000; padding: 12px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <div id="adminWrapper">
        <h1>🔐 لوحة إدارة أكاديمية إيموشا</h1>
        <div class="admin-box">
            <h2>✍️ نشر مقال</h2>
            <input type="text" id="artTitle" placeholder="عنوان المقال">
            <select id="artCategory">
                <option value="الرئيسية">الصفحة الرئيسية</option>
            </select>
            <textarea id="artContent" rows="6" placeholder="المحتوى (يمكنك وضع كود HTML هنا)"></textarea>
            <input type="text" id="imageURL" placeholder="رابط الصورة">
            <button class="btn-admin" onclick="saveNewArticle()">نشر للموقع 🚀</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCp-m2DkIIwIoKUeuntHLvDbEclB041pz4",
            authDomain: "shrouk-ehab.firebaseapp.com",
            projectId: "shrouk-ehab",
            storageBucket: "shrouk-ehab.firebasestorage.app",
            messagingSenderId: "1015714183835",
            appId: "1:1015714183835:web:cd71ea6fd14a6a2ef7643e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        window.onload = function() {
            var pass = prompt("الرقم السري:");
            if (pass === "123010111  55Ee") {
                document.getElementById('adminWrapper').style.display = 'block';
            } else { alert("خطأ!"); window.location.href = "index.html"; }
        };

        async function saveNewArticle() {
            var title = document.getElementById('artTitle').value;
            var cat = document.getElementById('artCategory').value;
            var cont = document.getElementById('artContent').value;
            var img = document.getElementById('imageURL').value;
            
            if(!title || !cont) return alert("املا البيانات يا بطل!");
            
            try {
                await db.collection("articles").add({
                    title: title,
                    category: cat,
                    content: cont,
                    image: img,
                    date: new Date().toLocaleDateString('ar-EG')
                });
                alert("تم النشر بنجاح! 🚀");
                document.getElementById('artTitle').value = "";
                document.getElementById('artContent').value = "";
            } catch (error) {
                alert("حدث خطأ: " + error.message);
            }
        }
    </script>
</body>
</html>
