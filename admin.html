<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم إيموشا - نسخة الفحص</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div id="adminWrapper" style="display:none; padding: 20px; background: #222; color: #fff;">
        <h1>لوحة التحكم النشطة</h1>
        <input type="text" id="artTitle" placeholder="عنوان المقال" style="width:100%; padding:10px; margin-bottom:10px;">
        <textarea id="artContent" rows="4" style="width:100%; margin-bottom:10px;"></textarea>
        <button id="btnPublish" style="padding:15px; width:100%; background:gold; font-weight:bold;">نشر المقال الآن</button>
    </div>

    <script>
        // 1. فحص هل Firebase محمل أم لا؟
        if (typeof firebase === 'undefined') {
            alert("تحذير: مكتبة Firebase لم يتم تحميلها! تأكد من اتصال الإنترنت.");
        }

        const config = {
            apiKey: "AIzaSyCp-m2DkIIwIoKUeuntHLvDbEclB041pz4",
            authDomain: "shrouk-ehab.firebaseapp.com",
            projectId: "shrouk-ehab",
            storageBucket: "shrouk-ehab.firebasestorage.app",
            messagingSenderId: "1015714183835",
            appId: "1:1015714183835:web:cd71ea6fd14a6a2ef7643e"
        };
        
        firebase.initializeApp(config);
        const db = firebase.firestore();

        if(prompt("الباسورد:") === "123010111  55Ee") {
            document.getElementById('adminWrapper').style.display = 'block';
        }

        document.getElementById("btnPublish").addEventListener("click", () => {
            db.collection("articles").add({
                title: document.getElementById("artTitle").value,
                content: document.getElementById("artContent").value,
                date: new Date().toISOString()
            })
            .then(() => alert("تم النشر بنجاح!"))
            .catch(err => alert("خطأ في Firebase: " + err.code + " - " + err.message));
        });
    </script>
</body>
</html>
