<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قراءة المقال - أكاديمية إيموشا</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --gold-primary: #d4af37;
            --text-color: #ffffff;
            --text-muted: #b3b3b3;
        }
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
        }
        .blessing-bar { background-color: var(--gold-primary); color: #000; text-align: center; padding: 8px 10px; font-weight: bold; font-size: 14px; }
        header { background-color: #000; border-bottom: 2px solid var(--gold-primary); padding: 15px 20px; text-align: center; }
        .logo { font-size: 26px; font-weight: bold; color: var(--gold-primary); text-decoration: none; }
        .main-container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .article-view { background-color: var(--card-bg); border-right: 5px solid var(--gold-primary); padding: 35px; border-radius: 6px; text-align: right; }
        .article-view h1 { color: var(--gold-primary); margin-top: 0; font-size: 28px; line-height: 1.4; }
        .article-meta { font-size: 13px; color: var(--gold-primary); margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 12px; }
        .article-content { font-size: 17px; line-height: 1.8; color: #f0f0f0; white-space: pre-line; }
        .back-link { display: inline-block; margin-top: 30px; color: var(--gold-primary); text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
        footer { background-color: #000000; border-top: 2px solid var(--gold-primary); padding: 30px 20px; margin-top: 60px; text-align: center; }
        .footer-links a { color: var(--text-color); text-decoration: none; margin: 0 15px; }
    </style>
</head>
<body>

    <div class="blessing-bar">
        اللهم صلِّ وسلِّم وبارك على نبينا محمد وعلى آله وصحبه أجمعين ✨
    </div>

    <header>
        <a href="index.html" class="logo">أكاديمية إيموشا</a>
    </header>

    <div class="main-container">
        <div class="article-view" id="articleViewContainer">
            <p style="color: var(--text-muted); text-align: center;">جاري تحميل المقال...</p>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="legal.html?tab=about">من نحن</a> | 
            <a href="legal.html?tab=privacy">سياسة الخصوصية</a> | 
            <a href="legal.html?tab=contact">اتصل بنا</a>
        </div>
        <p style="color: var(--text-muted); font-size: 13px; margin-top: 15px;">جميع الحقوق محفوظة © 2026 | إدارة القبطان إيهاب شرف</p>
    </footer>

    <script>
        window.onload = function() {
            var params = new URLSearchParams(window.location.search);
            var articleId = params.get('id');
            var articles = JSON.parse(localStorage.getItem('sharedArticles')) || [];
            
            // البحث عن المقال المطلوب بواسطة الـ ID الخاص به
            var article = articles.find(item => item.id == articleId);
            var container = document.getElementById('articleViewContainer');
            
            if(article) {
                document.title = article.title + " - أكاديمية إيموشا";
                container.innerHTML = `
                    <h1>${article.title}</h1>
                    <div class="article-meta">قسم: ${article.category} | تاريخ النشر: ${article.date}</div>
                    <div class="article-content">${article.content}</div>
                    <a href="index.html" class="back-link">← العودة للرئيسية</a>
                `;
            } else {
                container.innerHTML = `
                    <h1 style="color: #ff4444;">عفواً، المقال غير موجود!</h1>
                    <p style="color: var(--text-muted);">قد يكون الرابط خاطئاً أو تم حذف المقال من قبل الإدارة.</p>
                    <a href="index.html" class="back-link">← العودة للصفحة الرئيسية</a>
                `;
            }
        };
    </script>
</body>
</html>
