<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية إيموشا لعلوم المال والتعليم</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --gold-primary: #d4af37; --text-color: #ffffff; --text-muted: #b3b3b3; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); }
        .blessing-bar { background-color: var(--gold-primary); color: #000; text-align: center; padding: 8px; font-weight: bold; }
        header { background-color: #000; border-bottom: 2px solid var(--gold-primary); padding: 20px; text-align: center; }
        .logo { font-size: 28px; font-weight: bold; color: var(--gold-primary); text-decoration: none; }
        .main-container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .article-post { background-color: var(--card-bg); border-right: 4px solid var(--gold-primary); padding: 20px; margin-bottom: 20px; border-radius: 4px; text-align: right; }
        .btn { display: inline-block; background-color: var(--gold-primary); color: #000; padding: 10px 20px; border-radius: 6px; font-weight: bold; text-decoration: none; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="blessing-bar">اللهم صلِّ وسلِّم وبارك على نبينا محمد وعلى آله وصحبه أجمعين ✨</div>

    <header>
        <a href="index.html" class="logo">أكاديمية إيموشا</a>
    </header>

    <div class="main-container">
        <h2>آخر المقالات العامة</h2>
        <div id="mainArticlesContainer">جاري تحميل المقالات من الأكاديمية...</div>
    </div>

    <script>
        // إعدادات الربط الخاصة بمشروعك (emosha-academy)
        const firebaseConfig = {
            apiKey: "AIzaSyCp-m2DkIIwIoKUeuntHLvDbEclB041pz4",
            authDomain: "shrouk-ehab.firebaseapp.com",
            projectId: "shrouk-ehab",
            storageBucket: "shrouk-ehab.firebasestorage.app",
            messagingSenderId: "1015714183835",
            appId: "1:1015714183835:web:cd71ea6fd14a6a2ef7643e"
        };

        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // جلب المقالات من فايربيس وعرضها
        db.collection("articles").onSnapshot((snapshot) => {
            const container = document.getElementById('mainArticlesContainer');
            container.innerHTML = ""; 
            
            snapshot.forEach((doc) => {
                const article = doc.data();
                container.innerHTML += `
                    <div class="article-post">
                        <h3>${article.title || 'بدون عنوان'}</h3>
                        ${article.image ? `<img src="${article.image}" style="width: 100%; border-radius: 5px; margin-bottom: 10px;">` : ''}
                        <p style="white-space: pre-line;">${article.content || ''}</p>
                        <small style="color: var(--gold-primary);">تاريخ النشر: ${article.date || ''}</small>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
