<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الربح من الإنترنت - أكاديمية إيموشا</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --gold-primary: #d4af37;
            --gold-hover: #f3e5ab;
            --text-color: #ffffff;
            --text-muted: #b3b3b3;
        }

        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); }

        /* الهيدر الذهبي الموحد */
        header { background-color: #000; border-bottom: 2px solid var(--gold-primary); padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .logo { font-size: 28px; font-weight: bold; color: var(--gold-primary); text-decoration: none; }
        nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; width: 100%; max-width: 1200px; }
        nav a { color: var(--text-color); text-decoration: none; font-weight: bold; font-size: 12px; padding: 12px 10px; background-color: #1a1a1a; border: 1px solid #333; border-radius: 6px; transition: all 0.3s ease; text-align: center; flex: 1; min-width: 130px; }
        nav a:hover { background-color: #252525; border-color: var(--gold-primary); color: var(--gold-primary); }
        nav a.active { background-color: var(--gold-primary); color: #000; border-color: var(--gold-primary); }

        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; text-align: center; }
        h1 { color: var(--gold-primary); border-bottom: 2px solid #333; padding-bottom: 15px; margin-bottom: 30px; }
        
        .article-post { background: var(--card-bg); border-right: 4px solid var(--gold-primary); padding: 20px; margin-bottom: 20px; border-radius: 4px; text-align: right; }
        .article-post h3 a { color: #fff; text-decoration: none; transition: color 0.2s; }
        .article-post h3 a:hover { color: var(--gold-primary); }

        .btn-more { display: inline-block; background-color: var(--gold-primary); color: #000; text-decoration: none; padding: 12px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; font-size: 14px; margin-top: 20px; }
        .btn-more:hover { background-color: var(--gold-hover); }

        footer { background-color: #000; border-top: 2px solid var(--gold-primary); padding: 30px 20px; margin-top: 60px; text-align: center; }
        .footer-links a { color: var(--text-color); text-decoration: none; margin: 0 15px; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">أكاديمية إيموشا</a>
        <nav>
            <a href="index.html">الصفحة الرئيسية</a>
            <a href="internet-earning.html" class="active">الربح من الإنترنت</a>
            <a href="facebook.html">أسرار فيسبوك</a>
            <a href="web-dev.html">تطوير المواقع</a>
            <a href="thanwya-books.html">📚 الثانوية العامة</a>
            <a href="thanwya.html">🎓 نتيجة الثانوية العامة</a>
            <a href="azhar.html">🕌 نتيجة الثانوية الأزهرية</a>
        </nav>
    </header>

    <div class="container">
        <h1>قسم طرق وأسرار الربح من الإنترنت 💰</h1>
        
        <div id="sectionContainer">
            <p style="color: var(--text-muted);">جاري تحميل المقالات...</p>
        </div>

        <button id="loadMoreEarningBtn" class="btn-more" style="display:none;" onclick="loadMoreEarningArticles()">عرض المزيد من المقالات ⬇</button>
    </div>

    <footer>
        <div class="footer-links">
            <a href="legal.html?tab=about">من نحن</a> | 
            <a href="legal.html?tab=privacy">سياسة الخصوصية</a> | 
            <a href="legal.html?tab=contact">اتصل بنا</a>
        </div>
        <p style="color: var(--text-muted); font-size: 13px; margin-top: 15px;">جميع الحقوق محفوظة © 2026 | إدارة القبطان إيهاب شرف</p>
    </footer>

    <script>
        var displayedCount = 0;
        var earningItems = [];

        window.onload = function() {
            displayEarningContent();
        };

        function displayEarningContent() {
            var articles = JSON.parse(localStorage.getItem('sharedArticles')) || [];
            earningItems = articles.filter(item => item.category === "الربح من الإنترنت");
            var container = document.getElementById('sectionContainer');

            if(earningItems.length === 0) {
                container.innerHTML = `<p style="color: var(--text-muted);">لا توجد مقالات منشورة في هذا القسم حالياً.</p>`;
            } else {
                container.innerHTML = "";
                loadMoreEarningArticles();
            }
        }

        function loadMoreEarningArticles() {
            var container = document.getElementById('sectionContainer');
            var nextItems = earningItems.slice(displayedCount, displayedCount + 3);
            
            nextItems.forEach(function(item) {
                var excerpt = item.content.length > 150 ? item.content.substring(0, 150) + "..." : item.content;
                var articleUrl = "article.html?id=" + (item.id || "");

                container.innerHTML += `
                    <div class="article-post">
                        <h3><a href="${articleUrl}">${item.title}</a></h3>
                        <div style="font-size:12px; color: var(--gold-primary); margin-bottom: 8px;">${item.date}</div>
                        <p style="white-space: pre-line; color: #e0e0e0; line-height: 1.7;">${excerpt}</p>
                        <a href="${articleUrl}" style="color: var(--gold-primary); text-decoration: none; font-weight: bold; font-size: 14px;">اقرأ المقال كاملاً ←</a>
                    </div>`;
            });

            displayedCount += nextItems.length;
            if(displayedCount >= earningItems.length) {
                document.getElementById('loadMoreEarningBtn').style.display = 'none';
            } else {
                document.getElementById('loadMoreEarningBtn').style.display = 'inline-block';
            }
        }
    </script>
</body>
</html>
